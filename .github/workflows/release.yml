name: Release Build 双包打包

on:
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.set-ver.outputs.version }}
    steps:
      - id: set-ver
        run: |
          echo "version=$(date -d "8 hour" -u +3.%y.%m%d%H)" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        product: [ appS, appMax ]   # 只打两个包
      fail-fast: false
    outputs:
      version: ${{ needs.prepare.outputs.version }}
    env:
      product: ${{ matrix.product }}
      VERSION: ${{ needs.prepare.outputs.version }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17

      - name: 统一版本号
        run: |
          sed "/def version/c def version = \"${{ env.VERSION }}\"" app/build.gradle -i

      - name: 配置 Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: 开始打包
        run: |
          chmod +x gradlew
          ./gradlew assemble${{ env.product }}Release --parallel

      - name: 上传 APK（带产品标识）
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.product }}_apk
          path: app/build/outputs/apk/${{ env.product }}/release/*.apk
          retention-days: 1

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: 下载所有 APK
        uses: actions/download-artifact@v7
        with:
          pattern: '*_apk'
          path: all_apks
          merge-multiple: true

      - name: 列出下载的文件（调试用）
        run: ls -la all_apks/

      - name: 发布到 Release
        uses: softprops/action-gh-release@v2
        with:
          name: 阅读双包版 ${{ needs.prepare.outputs.version }}
          tag_name: ${{ needs.prepare.outputs.version }}
          body: |
            ## 自动打包：两个版本共存
            
            - 📱 阅读A·Max
            - 📱 阅读·Max
            
            两个版本可以同时安装，互不冲突。
          files: all_apks/*.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}